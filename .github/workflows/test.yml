name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.6

      - name: Install Haxe libraries
        run: |
          haxelib install hxnodejs --always --quiet
          haxe --version

      - name: Install npm dependencies
        run: npm install --ignore-scripts

      - name: Build dts2hx
        run: haxe build.hxml

      - name: Install test npm dependencies
        run: |
          cd test
          npm install --legacy-peer-deps

      - name: Run unit tests
        run: |
          cd test
          haxe --run RunUnit

      - name: Run lib tests
        continue-on-error: true
        run: |
          cd test
          haxe --run RunLibs

      - name: Run e2e tests
        shell: bash
        run: |
          cd test/e2e
          bash run.sh

      - name: Install example dependencies
        shell: bash
        run: |
          for dir in examples/*/; do
            name=$(basename "$dir")
            if [ -f "$dir/package-lock.json" ]; then
              echo -n "  $name: "
              (cd "$dir" && npm ci --ignore-scripts --legacy-peer-deps --omit=dev 2>&1 | tail -1) || echo "WARN: install failed"
            fi
          done

      - name: Test examples compile
        shell: bash
        run: bash test/test-examples.sh
